<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kade.the it is my page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      color: #222;
    }
    header {
      background: #111;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }
    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 1rem;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .post {
      margin-bottom: 2rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 1rem;
    }
    .post:last-child {
      border-bottom: none;
    }
    .post h2 {
      margin: 0 0 0.5rem;
    }
    .date {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 0.5rem;
    }
    textarea, input {
      width: 100%;
      margin-bottom: 0.5rem;
      padding: 0.5rem;
      font-size: 1rem;
    }
    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      background: #111;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <header>
    <h1>Here lies a place set apart for thoughts of use among the living;
the channel by which my voice goeth forth unto the world.</h1>
  </header>

  <div class="container">
    <h2>New Post</h2>
    <input id="title" placeholder="Title">
    <textarea id="content" rows="4" placeholder="What's going on?"></textarea>
    <button onclick="addPost()">Post</button>

    <hr>

    <div id="posts"></div>
  </div>

  <script>
    let posts = JSON.parse(localStorage.getItem('posts')) || [];

    function renderPosts() {
      const postsDiv = document.getElementById('posts');
      postsDiv.innerHTML = '';
      posts.slice().reverse().forEach(post => {
        const div = document.createElement('div');
        div.className = 'post';
        div.innerHTML = `
          <h2>${post.title}</h2>
          <div class="date">${post.date}</div>
          <p>${post.content}</p>
        `;
        postsDiv.appendChild(div);
      });
    }

    function addPost() {
      const title = document.getElementById('title').value;
      const content = document.getElementById('content').value;
      if (!title || !content) return;

      const post = {
        title,
        content,
        date: new Date().toLocaleString()
      };

      posts.push(post);
      localStorage.setItem('posts', JSON.stringify(posts));

      document.getElementById('title').value = '';
      document.getElementById('content').value = '';

      renderPosts();
    }

    renderPosts();
  </script>
</body>
</html>
